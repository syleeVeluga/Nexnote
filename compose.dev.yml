services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: wekiflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wekiflow
      POSTGRES_USER: wekiflow
      POSTGRES_PASSWORD: wekiflow
    ports:
      - "5433:5432"
    volumes:
      - wekiflow-postgres18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wekiflow -d wekiflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.2-alpine
    container_name: wekiflow-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - wekiflow-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  wekiflow-postgres18-data:
  wekiflow-redis-data: