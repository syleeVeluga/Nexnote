name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: asia-northeast3
  REGISTRY: asia-northeast3-docker.pkg.dev
  REPO: wekiflow

jobs:
  preflight:
    name: Deployment Preflight
    runs-on: ubuntu-latest
    outputs:
      auth_mode: ${{ steps.detect.outputs.auth_mode }}
      should_deploy: ${{ steps.detect.outputs.should_deploy }}

    steps:
      - name: Detect deployment configuration
        id: detect
        shell: bash
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCE_INSTANCE_NAME: ${{ vars.GCE_INSTANCE_NAME }}
          GCE_ZONE: ${{ vars.GCE_ZONE }}
          GCE_SSH_PRIVATE_KEY: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
        run: |
          auth_mode="none"
          should_deploy="false"
          reason="Missing Google Cloud authentication configuration."

          if [[ -n "$GCP_WORKLOAD_IDENTITY_PROVIDER" && -n "$GCP_SERVICE_ACCOUNT" ]]; then
            auth_mode="workload_identity"
            should_deploy="true"
            reason="Using Workload Identity Federation."
          elif [[ -n "$GCP_SA_KEY" ]]; then
            auth_mode="service_account_key"
            should_deploy="true"
            reason="Using service account JSON credentials."
          fi

          if [[ "$should_deploy" == "true" ]] && [[ -z "$GCE_INSTANCE_NAME" || -z "$GCE_ZONE" || -z "$GCE_SSH_PRIVATE_KEY" ]]; then
            auth_mode="none"
            should_deploy="false"
            reason="Missing GCE deployment settings (instance, zone, or SSH key)."
          fi

          echo "auth_mode=$auth_mode" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Explain skipped deployment
        if: steps.detect.outputs.should_deploy != 'true'
        run: |
          echo "::warning::Skipping build and deploy: ${{ steps.detect.outputs.reason }}"
          echo "Skipping build and deploy: ${{ steps.detect.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"

  build-push:
    name: Build & Push Images
    needs: preflight
    if: needs.preflight.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (Workload Identity)
        if: needs.preflight.outputs.auth_mode == 'workload_identity'
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key)
        if: needs.preflight.outputs.auth_mode == 'service_account_key'
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/wekiflow-api:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/wekiflow-worker:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/wekiflow-web:${{ steps.meta.outputs.tag }}
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GCE VM
    needs: [preflight, build-push]
    if: needs.preflight.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (Workload Identity)
        if: needs.preflight.outputs.auth_mode == 'workload_identity'
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key)
        if: needs.preflight.outputs.auth_mode == 'service_account_key'
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy via direct SSH
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_HR_CHANNEL_ID: ${{ vars.SLACK_HR_CHANNEL_ID }}
          SLACK_BOT_USER_ID: ${{ vars.SLACK_BOT_USER_ID }}
          SLACK_WEKIFLOW_WORKSPACE_ID: ${{ vars.SLACK_WEKIFLOW_WORKSPACE_ID }}
          SLACK_WEKIFLOW_USER_ID: ${{ vars.SLACK_WEKIFLOW_USER_ID }}
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          # SSH 키 설정
          mkdir -p ~/.ssh
          echo "${{ secrets.GCE_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # VM 외부 IP 조회
          VM_IP=$(gcloud compute instances describe ${{ vars.GCE_INSTANCE_NAME }} \
            --zone=${{ vars.GCE_ZONE }} \
            --project=${{ env.PROJECT_ID }} \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')

          # 공개키를 인스턴스 메타데이터에 등록
          PUB_KEY=$(ssh-keygen -y -f ~/.ssh/deploy_key)
          gcloud compute instances add-metadata ${{ vars.GCE_INSTANCE_NAME }} \
            --zone=${{ vars.GCE_ZONE }} \
            --project=${{ env.PROJECT_ID }} \
            --metadata="ssh-keys=parkjinhun:${PUB_KEY}"
          sleep 8

          # .env.prod 작성 후 SCP 전송
          cat > /tmp/env.prod << EOF
          IMAGE_REGISTRY=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}
          IMAGE_TAG=${IMAGE_TAG}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          REDIS_PASSWORD=${REDIS_PASSWORD}
          MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
          DATABASE_URL=postgresql://wekiflow:${POSTGRES_PASSWORD}@postgres:5432/wekiflow
          REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
          JWT_SECRET=${JWT_SECRET}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          GEMINI_API_KEY=${GEMINI_API_KEY}
          SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
          SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
          SLACK_HR_CHANNEL_ID=${SLACK_HR_CHANNEL_ID}
          SLACK_BOT_USER_ID=${SLACK_BOT_USER_ID}
          SLACK_WEKIFLOW_WORKSPACE_ID=${SLACK_WEKIFLOW_WORKSPACE_ID}
          SLACK_WEKIFLOW_USER_ID=${SLACK_WEKIFLOW_USER_ID}
          EOF
          sed -i 's/^[[:space:]]*//' /tmp/env.prod

          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            /tmp/env.prod parkjinhun@${VM_IP}:/opt/wekiflow/.env.prod

          # 배포 실행
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            parkjinhun@${VM_IP} '
              set -e
              cd /opt/wekiflow
              if ! git diff --quiet || ! git diff --cached --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
                git stash push --include-untracked -m "pre-deploy-$(date -u +%Y%m%dT%H%M%SZ)"
              fi
              git pull --ff-only origin main
              gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet
              docker compose -f docker-compose.prod.yml --env-file .env.prod pull

              # certbot 설치 및 인증서 최초 발급 (이미 있으면 갱신 시도만)
              if ! command -v certbot &>/dev/null; then
                sudo apt-get install -y certbot
              fi
              if [ ! -f /etc/letsencrypt/live/wekiflow.veluga.app/fullchain.pem ]; then
                # 최초 발급: nginx 80포트를 잠시 중단하고 standalone 모드로 발급
                docker compose -f docker-compose.prod.yml --env-file .env.prod stop web 2>/dev/null || true
                sudo certbot certonly --standalone \
                  -d wekiflow.veluga.app \
                  --email jjinoon@veluga.io \
                  --agree-tos --non-interactive
              else
                # 갱신 (만료 30일 이내일 때만 실제 갱신)
                sudo certbot renew --quiet || true
              fi

              docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans
              docker image prune -f || true
            '
