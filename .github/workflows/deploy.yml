name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: asia-northeast3                   # 서울 리전
  REGISTRY: asia-northeast3-docker.pkg.dev
  REPO: wekiflow

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write                       # Workload Identity 사용 시 필요

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # 대안: service_account_key 방식 (더 간단하지만 보안상 비추)
          # credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/wekiflow-api:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/wekiflow-worker:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/wekiflow-web:${{ steps.meta.outputs.tag }}
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GCE VM
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy via SSH
        uses: google-github-actions/ssh-compute@v1
        with:
          instance_name: ${{ vars.GCE_INSTANCE_NAME }}
          zone: ${{ vars.GCE_ZONE }}
          ssh_private_key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          command: |
            set -e
            cd /opt/wekiflow

            # pull latest compose file from repo
            git pull origin main

            # configure docker auth for Artifact Registry
            gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

            # write .env.prod (secrets injected by GitHub Actions)
            cat > .env.prod <<'ENVEOF'
            IMAGE_REGISTRY=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}
            IMAGE_TAG=${{ needs.build-push.outputs.image_tag }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
            DATABASE_URL=postgresql://wekiflow:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/wekiflow
            REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            ENVEOF

            docker compose -f docker-compose.prod.yml --env-file .env.prod pull
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans
            docker image prune -f
