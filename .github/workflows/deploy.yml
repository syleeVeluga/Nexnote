name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: asia-northeast3
  REGISTRY: asia-northeast3-docker.pkg.dev
  REPO: wekiflow

jobs:
  preflight:
    name: Deployment Preflight
    runs-on: ubuntu-latest
    outputs:
      auth_mode: ${{ steps.detect.outputs.auth_mode }}
      should_deploy: ${{ steps.detect.outputs.should_deploy }}

    steps:
      - name: Detect deployment configuration
        id: detect
        shell: bash
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCE_INSTANCE_NAME: ${{ vars.GCE_INSTANCE_NAME }}
          GCE_ZONE: ${{ vars.GCE_ZONE }}
          GCE_SSH_PRIVATE_KEY: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
        run: |
          auth_mode="none"
          should_deploy="false"
          reason="Missing Google Cloud authentication configuration."

          if [[ -n "$GCP_WORKLOAD_IDENTITY_PROVIDER" && -n "$GCP_SERVICE_ACCOUNT" ]]; then
            auth_mode="workload_identity"
            should_deploy="true"
            reason="Using Workload Identity Federation."
          elif [[ -n "$GCP_SA_KEY" ]]; then
            auth_mode="service_account_key"
            should_deploy="true"
            reason="Using service account JSON credentials."
          fi

          if [[ "$should_deploy" == "true" ]] && [[ -z "$GCE_INSTANCE_NAME" || -z "$GCE_ZONE" || -z "$GCE_SSH_PRIVATE_KEY" ]]; then
            auth_mode="none"
            should_deploy="false"
            reason="Missing GCE deployment settings (instance, zone, or SSH key)."
          fi

          echo "auth_mode=$auth_mode" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Explain skipped deployment
        if: steps.detect.outputs.should_deploy != 'true'
        run: |
          echo "::warning::Skipping build and deploy: ${{ steps.detect.outputs.reason }}"
          echo "Skipping build and deploy: ${{ steps.detect.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"

  build-push:
    name: Build & Push Images
    needs: preflight
    if: needs.preflight.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (Workload Identity)
        if: needs.preflight.outputs.auth_mode == 'workload_identity'
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key)
        if: needs.preflight.outputs.auth_mode == 'service_account_key'
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/wekiflow-api:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/wekiflow-worker:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/wekiflow-web:${{ steps.meta.outputs.tag }}
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GCE VM
    needs: [preflight, build-push]
    if: needs.preflight.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (Workload Identity)
        if: needs.preflight.outputs.auth_mode == 'workload_identity'
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key)
        if: needs.preflight.outputs.auth_mode == 'service_account_key'
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy via SSH
        uses: google-github-actions/ssh-compute@v2
        with:
          instance_name: ${{ vars.GCE_INSTANCE_NAME }}
          zone: ${{ vars.GCE_ZONE }}
          ssh_private_key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          command: |
            set -e
            cd /opt/wekiflow

            # pull latest compose file from repo
            git pull origin main

            # configure docker auth for Artifact Registry
            gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

            # write .env.prod (secrets injected by GitHub Actions)
            cat > .env.prod <<'ENVEOF'
            IMAGE_REGISTRY=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}
            IMAGE_TAG=${{ needs.build-push.outputs.image_tag }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
            DATABASE_URL=postgresql://wekiflow:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/wekiflow
            REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            ENVEOF

            docker compose -f docker-compose.prod.yml --env-file .env.prod pull
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans
            docker image prune -f
