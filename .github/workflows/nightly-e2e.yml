name: Nightly E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  nightly:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: nexnote
          POSTGRES_PASSWORD: nexnote
          POSTGRES_DB: nexnote
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexnote"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://nexnote:nexnote@127.0.0.1:5432/nexnote
      REDIS_URL: redis://127.0.0.1:6379/15
      API_PORT: 3101
      API_HOST: 127.0.0.1
      WEB_PORT: 4173
      JWT_SECRET: test-secret
      NODE_ENV: test
      AI_TEST_MODE: mock
      E2E_BASE_URL: http://127.0.0.1:4173
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install Playwright Browser
        run: corepack pnpm exec playwright install --with-deps chromium

      - name: Full Nightly Suite
        run: corepack pnpm run test:e2e:nightly

      - name: Upload Nightly Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-e2e-artifacts
          if-no-files-found: ignore
          path: |
            playwright-report
            test-results
