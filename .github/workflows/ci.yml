name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: nexnote
          POSTGRES_PASSWORD: nexnote
          POSTGRES_DB: nexnote
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexnote"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://nexnote:nexnote@127.0.0.1:5432/nexnote
      REDIS_URL: redis://127.0.0.1:6379
      API_PORT: 3001
      API_HOST: 127.0.0.1
      WEB_PORT: 5173
      JWT_SECRET: test-secret
      NODE_ENV: test
      AI_TEST_MODE: mock
      E2E_BASE_URL: http://127.0.0.1:5173
    steps:
      - uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit Tests
        run: pnpm test

      - name: Install Playwright Browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Integration Smoke
        run: pnpm run test:integration

      - name: Browser Smoke
        run: pnpm run test:e2e:smoke

      - name: Upload Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-artifacts
          if-no-files-found: ignore
          path: |
            playwright-report
            test-results
