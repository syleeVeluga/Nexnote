x-common-logging: &common-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    logging: *common-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wekiflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-wekiflow}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wekiflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *common-logging
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    logging: *common-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-wekiflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    logging: *common-logging
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-wekiflow} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/wekiflow-ingestions &&
      echo 'MinIO ready.'
      "
    restart: on-failure

  migrate:
    image: ${IMAGE_REGISTRY}/wekiflow-api:${IMAGE_TAG:-latest}
    logging: *common-logging
    command: ["node", "packages/db/dist/migrate.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MIGRATION_LOCK_TIMEOUT_MS: ${MIGRATION_LOCK_TIMEOUT_MS:-10000}
      MIGRATION_STATEMENT_TIMEOUT_MS: ${MIGRATION_STATEMENT_TIMEOUT_MS:-300000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: ${IMAGE_REGISTRY}/wekiflow-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *common-logging
    environment:
      NODE_ENV: production
      API_PORT: 3001
      API_HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-wekiflow}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: wekiflow-ingestions
      S3_REGION: us-east-1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      INGESTION_RATE_LIMIT_PER_MINUTE: ${INGESTION_RATE_LIMIT_PER_MINUTE:-60}
      INGESTION_QUOTA_PER_DAY: ${INGESTION_QUOTA_PER_DAY:-5000}
      IMPORT_RATE_LIMIT_PER_MINUTE: ${IMPORT_RATE_LIMIT_PER_MINUTE:-60}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_HR_CHANNEL_ID: ${SLACK_HR_CHANNEL_ID:-}
      SLACK_BOT_USER_ID: ${SLACK_BOT_USER_ID:-}
      SLACK_WEKIFLOW_WORKSPACE_ID: ${SLACK_WEKIFLOW_WORKSPACE_ID:-}
      SLACK_WEKIFLOW_USER_ID: ${SLACK_WEKIFLOW_USER_ID:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    image: ${IMAGE_REGISTRY}/wekiflow-worker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *common-logging
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-wekiflow}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: wekiflow-ingestions
      S3_REGION: us-east-1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      INGESTION_RATE_LIMIT_PER_MINUTE: ${INGESTION_RATE_LIMIT_PER_MINUTE:-60}
      INGESTION_QUOTA_PER_DAY: ${INGESTION_QUOTA_PER_DAY:-5000}
      IMPORT_RATE_LIMIT_PER_MINUTE: ${IMPORT_RATE_LIMIT_PER_MINUTE:-60}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f \"worker/dist/index\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: ${IMAGE_REGISTRY}/wekiflow-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *common-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # VM 호스트의 certbot 인증서를 컨테이너에 마운트 (읽기 전용)
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  pgdata:
  redisdata:
  miniodata:
