server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME 챌린지 (certbot webroot 방식)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 모든 HTTP 요청 → HTTPS 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/wekiflow.veluga.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wekiflow.veluga.app/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Docker embedded DNS
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API reverse proxy
    location /api/ {
        set $upstream http://api:3001;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
