server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Docker embedded DNS — lazy resolution so nginx starts even if api is not yet up
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API reverse proxy — trailing slash intentionally omitted so /api/v1/...
    # is forwarded upstream as-is (the Fastify app mounts under /api/v1).
    location /api/ {
        set $upstream http://api:3001;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
