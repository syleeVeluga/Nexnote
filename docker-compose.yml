services:
  postgres:
    image: postgres:18
    container_name: nexnote-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nexnote
      POSTGRES_PASSWORD: nexnote
      POSTGRES_DB: nexnote
    volumes:
      - nexnote-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexnote"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexnote-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nexnote-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: nexnote
      MINIO_ROOT_PASSWORD: nexnote-dev-secret
    volumes:
      - nexnote-miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: nexnote-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 nexnote nexnote-dev-secret &&
      mc mb --ignore-existing local/nexnote-ingestions &&
      echo 'MinIO bucket ready.'
      "

volumes:
  nexnote-pgdata:
  nexnote-miniodata:
